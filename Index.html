<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdo Restrito</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-purple': '#b026ff',
                        'neon-pink': '#ff26a5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Import da Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        /* Custom Styles & Effects */
        .extreme-blur {
            /* Desfoque reduzido em 20% conforme solicitado */
            filter: blur(12px) brightness(0.8);
            transform: scale(1.1); /* Prevent blur edges from showing */
        }
        
        .light-blur {
            /* Desfoque reduzido em 70% para a galeria */
            filter: blur(3.6px) brightness(0.9);
            transform: scale(1.05);
        }
        
        .vhs-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.15;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        .grain {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200vh;
            background: transparent url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png') repeat 0 0;
            background-size: 256px;
            opacity: 0.06;
            animation: noise .2s infinite;
            pointer-events: none;
            z-index: 49;
        }

        @keyframes noise {
            0% { transform: translate(0,0) }
            10% { transform: translate(-5%,-5%) }
            20% { transform: translate(-10%,5%) }
            30% { transform: translate(5%,-10%) }
            40% { transform: translate(-5%,15%) }
            50% { transform: translate(-10%,5%) }
            60% { transform: translate(15%,0) }
            70% { transform: translate(0,15%) }
            80% { transform: translate(3%,35%) }
            90% { transform: translate(-10%,10%) }
        }

        .glitch-text {
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes pulse-neon {
            0%, 100% { box-shadow: 0 0 15px rgba(176, 38, 255, 0.5), 0 0 30px rgba(176, 38, 255, 0.3); }
            50% { box-shadow: 0 0 25px rgba(176, 38, 255, 0.8), 0 0 50px rgba(176, 38, 255, 0.5); }
        }

        .btn-neon {
            background: linear-gradient(90deg, #b026ff, #ff26a5);
            animation: pulse-neon 2s infinite;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center relative">

    <!-- Efeitos Visuais Globais -->
    <div class="vhs-effect"></div>
    <div class="grain"></div>

    <!-- Container Principal (Mobile First) -->
    <main class="w-full max-w-md mx-auto px-4 py-8 relative z-10 flex flex-col min-h-screen justify-center">

        <!-- HERO SECTION -->
        <section class="flex flex-col items-center text-center space-y-6 w-full mt-4">
            
            <!-- Headline -->
            <div class="space-y-2">
                <div class="inline-flex items-center space-x-2 bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 border border-red-500/30">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span>Vazado</span>
                </div>
                <h1 class="text-3xl font-black leading-tight tracking-tight text-white/90 glitch-text">
                    "ela disse que era só brincadeira… até começar 🍷"
                </h1>
                <p class="text-gray-400 text-sm font-medium px-4">
                    o vídeo completo ficou disponível por pouco tempo no privado
                </p>
            </div>

            <!-- Video Preview Container -->
            <div class="w-full relative rounded-2xl overflow-hidden border border-gray-800 shadow-[0_0_30px_rgba(176,38,255,0.15)] group mt-4">
                
                <!-- Vídeo Real Desfocado -->
                <div class="relative w-full aspect-[4/5] bg-gray-900 overflow-hidden cursor-pointer" onclick="handleCtaClick()">
                    
                    <video autoplay loop muted playsinline class="w-full h-full object-cover extreme-blur opacity-80">
                        <source src="https://presellaurinhabot.vercel.app/video-menu.mp4" type="video/mp4">
                        Seu navegador não suporta vídeos.
                    </video>
                    
                    <!-- Sobreposição de Play Button -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-20 h-20 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 group-hover:scale-110 transition-transform">
                            <svg class="w-8 h-8 text-white ml-2" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </div>
                    </div>

                    <!-- Indicador de Duração Falsa -->
                    <div class="absolute bottom-4 right-4 bg-black/80 px-2 py-1 rounded text-xs font-mono text-gray-300 backdrop-blur-sm border border-gray-700">
                        02:47
                    </div>
                </div>
            </div>

            <!-- Contador Regressivo e CTA Principal -->
            <div class="w-full space-y-4">
                <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-4 backdrop-blur-sm">
                    <p class="text-xs text-gray-400 mb-2 uppercase tracking-widest font-bold">O link expira em:</p>
                    <div class="flex justify-center items-center space-x-2 text-2xl font-mono font-black text-neon-pink" id="timer">
                        <span>00</span><span class="text-gray-600">:</span><span id="minutes">04</span><span class="text-gray-600">:</span><span id="seconds">32</span>
                    </div>
                </div>

                <button onclick="handleCtaClick()" class="btn-neon w-full py-4 px-6 rounded-xl text-white font-black text-lg uppercase tracking-wide transform hover:-translate-y-1 transition-all active:scale-95 shadow-2xl flex items-center justify-center space-x-2">
                    <span>Assistir Antes Que Apague</span>
                    <span>👀</span>
                </button>
            </div>
        </section>

        <!-- SEÇÃO DE PREVIEWS ADICIONADA: MAIS MÍDIAS DA GALERIA -->
        <section class="w-full mt-10 space-y-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-sm font-bold text-gray-300 uppercase tracking-wider flex items-center space-x-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-neon-purple"></span>
                    <span>Mais da Galeria (3)</span>
                </h3>
                <span class="text-xs text-red-500 font-bold px-2 py-1 bg-red-500/10 rounded border border-red-500/20">🔒 BLOQUEADO</span>
            </div>

            <!-- Grid com 3 mídias borradas -->
            <div class="grid grid-cols-3 gap-3">
                <!-- Preview 1 (Imagem) -->
                <div class="relative aspect-square bg-gray-900 rounded-lg overflow-hidden border border-gray-800 cursor-pointer group" onclick="handleCtaClick()">
                    <img src="https://presellaurinhabot.vercel.app/foto-1.jpeg" class="w-full h-full object-cover light-blur opacity-50 group-hover:opacity-70 transition-opacity" alt="preview">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-2xl">🔒</span>
                    </div>
                </div>
                <!-- Preview 2 (Vídeo) -->
                <div class="relative aspect-square bg-gray-900 rounded-lg overflow-hidden border border-gray-800 cursor-pointer group" onclick="handleCtaClick()">
                    <video autoplay loop muted playsinline class="w-full h-full object-cover light-blur opacity-50 group-hover:opacity-70 transition-opacity">
                        <source src="https://presellaurinhabot.vercel.app/avid-tab.mp4" type="video/mp4">
                    </video>
                    <div class="absolute inset-0 flex flex-col items-center justify-center space-y-1 pointer-events-none">
                        <svg class="w-6 h-6 text-white/50" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <span class="text-[10px] font-mono text-white/50 bg-black/60 px-1 rounded">01:15</span>
                    </div>
                </div>
                <!-- Preview 3 (Imagem) -->
                <div class="relative aspect-square bg-gray-900 rounded-lg overflow-hidden border border-gray-800 cursor-pointer group" onclick="handleCtaClick()">
                    <img src="https://presellaurinhabot.vercel.app/zapsara.jpeg" class="w-full h-full object-cover light-blur opacity-50 group-hover:opacity-70 transition-opacity" alt="preview">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-2xl">🔒</span>
                    </div>
                </div>
            </div>
            <p class="text-center text-xs text-gray-500 mt-2 font-medium">Toque para desbloquear o álbum completo</p>
        </section>

        <!-- CTA FINAL (Removida a prova social e previews) -->
        <section class="w-full mt-12 mb-8 text-center space-y-4">
            <p class="text-gray-500 text-sm font-medium">o restante foi movido pro privado</p>
            <button onclick="handleCtaClick()" class="w-full bg-gray-800 hover:bg-gray-700 border border-gray-700 py-4 px-6 rounded-xl text-white font-bold uppercase tracking-wide transition-colors active:bg-gray-900">
                Acessar Agora
            </button>
        </section>

    </main>

    <script>
        // Lógica do Contador Regressivo (Persistente no LocalStorage)
        function startTimer() {
            // Define o tempo inicial em segundos (4min e 32seg)
            const initialTime = (4 * 60) + 32;
            
            // Verifica se já existe um tempo salvo no navegador
            let timeLeft = localStorage.getItem('leakPresellTimer');
            
            if (!timeLeft) {
                timeLeft = initialTime;
            } else {
                timeLeft = parseInt(timeLeft);
            }

            const minEl = document.getElementById('minutes');
            const secEl = document.getElementById('seconds');

            const interval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    // Opcional: O que fazer quando zerar?
                    // Por padrão, mantemos no zero para causar frustração/urgência
                    minEl.textContent = '00';
                    secEl.textContent = '00';
                    return;
                }

                timeLeft--;
                localStorage.setItem('leakPresellTimer', timeLeft);

                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;

                minEl.textContent = minutes.toString().padStart(2, '0');
                secEl.textContent = seconds.toString().padStart(2, '0');
            }, 1000);
        }

        // Lógica de Clique e Redirecionamento
        function handleCtaClick() {
            // Pequeno feedback visual/haptico antes de redirecionar (opcional)
            document.body.style.opacity = '0.5';
            setTimeout(() => {
                // Link fornecido para o Telegram
                window.location.href = 'https://t.me/Laurinha_Eighteenbot';
            }, 150);
        }

        // Iniciar quando a página carregar
        window.onload = function() {
            startTimer();
        };
    </script>
</body>
</html>
